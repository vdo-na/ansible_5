[webservers]
vm1 ansible_host=192.168.56.10
vm2 ansible_host=192.168.56.11

[webservers:vars]
ansible_user=vagrant
# Указываем путь к ключам, которые мы скопировали в Linux (~/ это домашняя папка)
ansible_ssh_private_key_file=~/.ssh/{{ inventory_hostname }}_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
# Говорим повышать права (sudo)
ansible_become=yes