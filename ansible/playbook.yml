---
- name: Полная настройка серверов (Практика 5)
  hosts: webservers
  become: yes 
  
  vars:
    software_version: "2.0.2-1" 
    
    git_repos:
      - { url: 'https://github.com/expressjs/express.git', dest: '/opt/express' }
      - { url: 'https://github.com/socketio/socket.io.git', dest: '/opt/socketio' }
      - { url: 'https://github.com/moment/moment.git', dest: '/opt/moment' }

  tasks:
    - name: Обновление кэша пакетов apt
      ansible.builtin.apt:
        update_cache: yes

    - name: 1. Запись времени и пользователя (идемпотентно)
      ansible.builtin.copy:
        content: "User: {{ ansible_user }}\nTime: {{ ansible_date_time.iso8601 }}"
        dest: "/home/vagrant/info.txt"
        owner: vagrant
        group: vagrant
        force: no
      become: no

    - name: 2. Установка пакета tree конкретной версии
      ansible.builtin.apt:
        name: "tree={{ software_version }}"
        state: present

    - name: 3.1 Добавление ключа Nginx
      ansible.builtin.apt_key:
        url: https://nginx.org/keys/nginx_signing.key
        state: present

    - name: 3.2 Добавление репозитория Nginx
      ansible.builtin.apt_repository:
        repo: deb https://nginx.org/packages/ubuntu/ jammy nginx
        state: present

    - name: 3.3 Установка Nginx из нового репозитория
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: 4. Изменение порта в конфигурации Nginx
      ansible.builtin.replace:
        path: /etc/nginx/conf.d/default.conf
        regexp: 'listen       80;'
        replace: 'listen       8080;'
      notify: Перезапуск Nginx

    - name: 5. Замена файла конфига шаблоном с созданием backup
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        backup: yes
      notify: Перезапуск Nginx

    - name: 6. Скачивание README файла Ansible
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/ansible/ansible/devel/README.md
        dest: /home/vagrant/ansible_readme.md
      register: download_result
      until: download_result is succeeded
      retries: 3
      delay: 5

    - name: 7. Добавление cron-задачи очистки apt
      ansible.builtin.cron:
        name: "Clear apt cache"
        minute: "0"
        hour: "3"
        weekday: "0"
        job: "/usr/bin/apt-get clean"

    - name: Установка git и npm
      ansible.builtin.apt:
        name: ['git', 'npm']
        state: present

    - name: 8.1 Выгрузка git-репозиториев
      ansible.builtin.git:
        repo: "{{ item.url }}"
        dest: "{{ item.dest }}"
        version: master
        update: no 
      loop: "{{ git_repos }}"

    - name: 8.2 Установка зависимостей npm
      ansible.builtin.command:
        cmd: npm install
        chdir: "{{ item.dest }}"
      loop: "{{ git_repos }}"
      args:
        creates: "{{ item.dest }}/node_modules"

  handlers:
    - name: Перезапуск Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted